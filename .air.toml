root = "."
testdata_dir = "testdata"
tmp_dir = "../bin"
env_files = [".env"]

[build]
  args_bin = ["daemon", "start"]
  bin = "../bin/filamate"
  cmd = "go build -o ../bin/filamate ."
  delay = 0
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "ui", "static/assets"]
  exclude_file = ["index.html", "favicon.ico"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "toml", "html"]
  include_file = ["static/index.html"]
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
