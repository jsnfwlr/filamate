# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/v2.6.0/configuration-schema.json

package: oapi
output: ./internal/server/oapi/oapi.gen.go
output-options:
  nullable-type: false
  skip-prune: false
  name-normalizer: ToCamelCaseWithInitialisms
  prefer-skip-optional-pointer-with-omitzero: true

generate:
  std-http-server: true
  strict-server: true
  embedded-spec: true
  models: true
  client: false
